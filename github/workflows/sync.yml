name: Sync to Hugging Face Hub
on:
  push:
    branches: [main] # سيتم التشغيل عند التحديث على فرع main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # استبدل USER_NAME باسم مستخدم HF و SPACE_NAME باسم الـ Space الخاص بك
          git push --force https://oddeehh:$HF_TOKEN@huggingface.co/spaces/oddeehh/lllaaasssttt main
